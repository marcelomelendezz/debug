<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background:#000; color:#00ff41; font-family:'Courier New',monospace; padding:10px; font-size:11px; }
  .warn { color:#ffdd57; } .err { color:#ff4444; }
</style>
</head>
<body>
<div id="out"></div>
<script>
const out = document.getElementById('out');
function log(msg, cls='') {
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = '» ' + msg;
  out.appendChild(d);
}

// Medidas reales
log('innerWidth: ' + window.innerWidth);
log('innerHeight: ' + window.innerHeight);
log('body.clientWidth: ' + document.body.clientWidth);
log('body.clientHeight: ' + document.body.clientHeight);
log('body.scrollHeight: ' + document.body.scrollHeight);

// Crear canvas y medir
const canvas = document.createElement('canvas');
canvas.style.width = '100%';
canvas.style.height = '200px';
document.body.appendChild(canvas);
const rect = canvas.getBoundingClientRect();
log('canvas rect.width: ' + rect.width);
log('canvas rect.height: ' + rect.height);
log('canvas rect.top: ' + rect.top);
log('canvas rect.bottom: ' + rect.bottom);

// Simular exactamente lo que hace el juego
const HUD_H = 28;
const CTRL_H = 110;
const canvasH = Math.max(200, window.innerHeight - HUD_H - CTRL_H);
const playerY = canvasH - 36;
const invLastRow = 4; // 4 rows
const invEndY = 40 + invLastRow * (24 + 12); // IH+IPADY
log('canvasH calculado: ' + canvasH, canvasH > 400 ? 'warn' : '');
log('playerY: ' + playerY);
log('invEndY (fila más baja): ' + invEndY);
log('espacio naves->jugador: ' + (playerY - invEndY) + 'px', (playerY-invEndY) < 50 ? 'err' : '');

// Test: ¿las naves ya tocan al jugador desde el inicio?
const deathLine = playerY - 30;
log('deathLine: ' + deathLine);
log('¿inv toca deathLine al inicio? ' + (invEndY >= deathLine), invEndY >= deathLine ? 'err' : '');

// Scroll test
log('pageYOffset: ' + window.pageYOffset, window.pageYOffset > 0 ? 'warn' : '');
log('scrollY: ' + window.scrollY, window.scrollY > 0 ? 'warn' : '');
</script>
</body>
</html>
